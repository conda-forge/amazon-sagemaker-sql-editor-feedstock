{% set name = "amazon_sagemaker_sql_editor" %}
{% set version = "0.2.4" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/amazon_sagemaker_sql_editor-{{ version }}.tar.gz
  sha256: f1aae40b270ac027cebb93bdbb750ac6233671f996d535e28ba4baafdfb10cac

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  overlinking_ignore_patterns:
    - "**/sql-language-server/node_modules/**"

requirements:
  host:
    - python >=3.8
    - hatchling >=1.5.0
    - jupyterlab >=4.1,<5
    - hatch-nodejs-version
    - pip
    - hatch-jupyter-builder
  run:
    - python >=3.8
    - rpds-py ==0.27.1
    - jupyterlab-lsp ==5.0.*
    - diskcache ==5.6.*
    - jupyter_server
    - botocore >=1.41.0,<2
    - aiobotocore >=3.0.0,<4
    - boto3 >=1.42.2,<2
    - sagemaker-jupyterlab-extension-common >=0.2.1,<1
    - amazon-sagemaker-sql-execution >=0.0.7,<1

test:
  imports:
    - amazon_sagemaker_sql_editor
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://pypi.org/project/amazon-sagemaker-sql-editor/
  summary: 'Package which provides sql editor functionalities for Sagemaker SQL extension'
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - joshuatowner
    - aws-pavankks
    - msgupta-amazon
    - aws-brianxia
    - sgganjo
    - aws-jasakshi
    - aakashmandavilli96
    - chad119
    - nileshvd
    - bhadrip
    - kumarnzt
    - gogakoreli
    - varun196
    - HariniNarayanan
